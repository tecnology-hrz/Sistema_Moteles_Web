<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/habitaciones.css?v=2">
    <link rel="stylesheet" href="css/color-picker-profesional.css?v=1">

</head>
<body>

            </div>
            <div class="user-name" id="userName">Administrador</div>
            <div class="user-role">Administrador</div>
        </div>
        <nav class="nav-menu">
            <a href="dasboard-admin.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Turnos</span></a>
            <a href="habitaciones.html" class="nav-item"><i class="fas fa-door-closed"></i><span>Habitaciones</span></a>
            <a href="tarifas.html" class="nav-item"><i class="fas fa-tags"></i><span>Tarifas</span></a>
            <a href="reservaciones.html" class="nav-item active"><i class="fas fa-calendar-check"></i><span>Reservaciones</span></a>
            <a href="facturacion.html" class="nav-item"><i class="fas fa-cash-register"></i><span>Facturación</span></a>
            <a href="gestion-productos.html" class="nav-item"><i class="fas fa-box"></i><span>Productos</span></a>
            <a href="gestion-sedes.html" class="nav-item"><i class="fas fa-map-marked-alt"></i><span>Sedes</span></a>
            <a href="gestion-usuarios.html" class="nav-item"><i class="fas fa-users-cog"></i><span>Gestión de Usuarios</span></a>
            <a href="gastos-sede.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Gastos por Sede</span></a>
            <a href="reportes.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Reportes</span></a>
        </nav>
        <div class="logout-section">
            <a href="#" class="logout-btn" onclick="cerrarSesion()"><span>Cerrar Sesión</span><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <h1 class="page-title"><i class="fas fa-calendar-check"></i> Reservaciones</h1>
            <div class="top-bar-actions">
                <button class="top-bar-btn" onclick="abrirSelectorHabitacionReserva()">
                    <i class="fas fa-plus"></i> Nueva Reserva
                </button>
            </div>
        </div>
        <div class="content-area">
            <div class="reservas-container">
                <div class="reservas-vacio" id="reservasVacio">
                    <i class="fas fa-calendar-times"></i>
                    <p>No hay reservaciones activas</p>
                </div>
                <div class="reservas-grid" id="reservasGrid"></div>
            </div>
        </div>
    </main>

    <!-- Select oculto para compatibilidad con ocupar-habitacion-profesional.js -->
    <select id="sedeFilter" style="display:none;"></select>

    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/cache-zoom.js"></script>
    <script src="js/permisos.js"></script>
    <script src="js/ocupar-habitacion-profesional.js?v=1" defer></script>
    <script src="js/reservaciones.js?v=1" defer></script>
<script src="js/sidebar-mobile.js"></script>
