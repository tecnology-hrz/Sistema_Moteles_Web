<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Sistema Moteles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/gestion-usuarios.css">
    <link rel="stylesheet" href="css/modal.css">
</head>
<body>
    <!-- Panel lateral -->
    <aside class="sidebar">
        <div class="user-profile">
            <div class="user-avatar">
                <i class="fas fa-user"></i>
                <div class="user-status"></div>
            </div>
            <div class="user-name" id="userName">Administrador</div>
            <div class="user-role">Administrador</div>
        </div>
        
        <nav class="nav-menu">
            <a href="dasboard-admin.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Turnos</span>
            </a>
            <a href="habitaciones.html" class="nav-item">
                <i class="fas fa-door-closed"></i>
                <span>Habitaciones</span>
            </a>
            <a href="tarifas.html" class="nav-item">
                <i class="fas fa-tags"></i>
                <span>Tarifas</span>
            </a>
            <a href="reservaciones.html" class="nav-item">
                <i class="fas fa-calendar-check"></i>
                <span>Reservaciones</span>
            </a>
            <a href="facturacion.html" class="nav-item">
                <i class="fas fa-cash-register"></i>
                <span>Facturación</span>
            </a>
            <a href="gestion-productos.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Productos</span>
            </a>
            <a href="gestion-sedes.html" class="nav-item">
                <i class="fas fa-map-marked-alt"></i>
                <span>Sedes</span>
            </a>
            <a href="gestion-usuarios.html" class="nav-item active">
                <i class="fas fa-users-cog"></i>
                <span>Gestión de Usuarios</span>
            </a>
            <a href="gastos-sede.html" class="nav-item">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Gastos por Sede</span>
            </a>
            <a href="reportes.html" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reportes</span>
            </a>
        </nav>
        
        <div class="logout-section">
            <a href="#" class="logout-btn" onclick="cerrarSesion()">
                <span>Cerrar Sesión</span>
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </aside>
    
    <!-- Contenido principal -->
    <main class="main-content">
        <div class="top-bar">
            <h1 class="page-title">Gestión de Usuarios</h1>
            <div class="top-bar-actions">
                <button class="top-bar-btn" onclick="abrirModalNuevoUsuario()">
                    <i class="fas fa-user-plus"></i> Nuevo Usuario
                </button>
            </div>
        </div>
        
        <div class="content-area">
            <div class="usuarios-container">
                <div class="usuarios-header">
                    <div class="search-and-sede-filters">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Buscar usuario..." onkeyup="filtrarUsuarios()">
                        </div>
                        <div class="sede-filter">
                            <i class="fas fa-map-marker-alt"></i>
                            <select id="sedeFilter" onchange="filtrarUsuarios()">
                                <option value="todas">Todas las sedes</option>
                            </select>
                        </div>
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" onclick="filtrarPorRol('todos')">Todos</button>
                        <button class="filter-btn" onclick="filtrarPorRol('admin')">Administradores</button>
                        <button class="filter-btn" onclick="filtrarPorRol('empleado')">Empleados</button>
                    </div>
                </div>
                
                <div class="usuarios-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Sede</th>
                                <th>Permisos</th>
                                <th>Contraseña</th>
                                <th>Fecha Registro</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuariosTableBody">
                            <tr>
                                <td colspan="8" class="loading">
                                    <i class="fas fa-spinner fa-spin"></i> Cargando usuarios...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Modal Container -->
    <div id="modalOverlay" class="modal-overlay">
        <div id="modalContainer" class="modal-container">
            <div class="modal-icon" id="modalIcon"></div>
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalMessage" class="modal-message"></p>
            <button id="modalButton" class="modal-button"></button>
        </div>
    </div>
    
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/cache-zoom.js"></script>
    <script src="js/permisos.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/dashboard.js" defer></script>
    <script src="js/gestion-usuarios.js" defer></script>
<script src="js/sidebar-mobile.js"></script>
</body>
</html>
