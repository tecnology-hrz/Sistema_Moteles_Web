<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Moteles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/modal.css">
</head>
<body>
    <!-- Icono de Configuración -->
    <div class="config-icon" onclick="mostrarModalConfigPassword()" title="Configuración del Sistema">
        <i class="fas fa-cog"></i>
    </div>

    <!-- Contenedor de Login -->
    <div id="loginContainer" class="container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-door-closed"></i>
            </div>
            <h1>Bienvenido</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required style="text-transform: uppercase;" pattern="[^\s]+" title="No se permiten espacios">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper has-toggle">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                    <svg class="password-toggle" id="togglePassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="togglePasswordVisibility('password', 'togglePassword')">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn">Iniciar Sesión</button>
        </form>

        <div class="divider">o</div>

        <button type="button" class="btn btn-secondary" onclick="mostrarRegistro()">Crear Cuenta</button>
    </div>

    <!-- Contenedor de Registro -->
    <div id="registroContainer" class="container container-registro hidden">
        <div class="logo">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </div>
            <h1>Crear Cuenta</h1>
            <p>Regístrate en el sistema</p>
        </div>

        <div id="messageRegistro" class="message"></div>

        <form id="registroForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="regUsername">Usuario</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="regUsername" placeholder="Mínimo 4 caracteres" required style="text-transform: uppercase;" pattern="[^\s]+" title="No se permiten espacios">
                    </div>
                    <div class="info-text">Mínimo 4 caracteres</div>
                </div>

                <div class="form-group">
                    <label for="regSede">Sede</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <input type="text" id="regSede" readonly placeholder="Cargando sede...">
                    </div>
                    <div class="info-text" id="regSedeInfo">Esta es la sede a la que pertenecerás</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="regPassword">Contraseña</label>
                    <div class="input-wrapper has-toggle">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="regPassword" placeholder="Mínimo 8 caracteres" required>
                        <svg class="password-toggle" id="toggleRegPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="togglePasswordVisibility('regPassword', 'toggleRegPassword')">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <div class="password-strength">
                        <div id="passwordStrengthBar" class="password-strength-bar"></div>
                    </div>
                    <div class="info-text" id="passwordStrengthText">Mínimo 8 caracteres</div>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirmar Contraseña</label>
                    <div class="input-wrapper has-toggle">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="regConfirmPassword" placeholder="Repite tu contraseña" required>
                        <svg class="password-toggle" id="toggleRegConfirmPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="togglePasswordVisibility('regConfirmPassword', 'toggleRegConfirmPassword')">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="mostrarLogin()">Volver</button>
                <button type="submit" class="btn">Registrarse</button>
            </div>
        </form>
    </div>

    <!-- Modal Container -->
    <div id="modalOverlay" class="modal-overlay">
        <div id="modalContainer" class="modal-container">
            <div class="modal-icon" id="modalIcon"></div>
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalMessage" class="modal-message"></p>
            <button id="modalButton" class="modal-button"></button>
        </div>
    </div>

    <!-- Modal de Contraseña de Configuración -->
    <div id="modalConfigPassword" class="config-modal-overlay">
        <div class="config-modal-content">
            <div class="config-modal-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="config-modal-title">Acceso a Configuración</h2>
            <p class="config-modal-message">Ingresa la contraseña de administrador</p>
            <form id="formConfigPassword" class="config-form">
                <div class="input-wrapper has-toggle">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="configPassword" placeholder="Contraseña" required>
                    <svg class="password-toggle" id="toggleConfigPassword" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="togglePasswordVisibility('configPassword', 'toggleConfigPassword')">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
                <div class="config-buttons">
                    <button type="button" class="config-btn config-btn-cancel" onclick="cerrarModalConfigPassword()">Cancelar</button>
                    <button type="submit" class="config-btn config-btn-submit">Acceder</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/cache-zoom.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/login.js" defer></script>
</body>
</html>
